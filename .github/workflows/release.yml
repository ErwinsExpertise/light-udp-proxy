name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write   # needed to push tags and create GitHub releases
  packages: write   # needed if you add Docker image publishing later

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so the tag action can determine the
          # previous tag and generate a correct version bump.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      # Automatically bump the semver tag on every push to main.
      # The tag follows the pattern vMAJOR.MINOR.PATCH.
      # Commits prefixed with "feat:" bump the minor version;
      # commits prefixed with "fix:" / "perf:" bump the patch version;
      # commits containing "BREAKING CHANGE" bump the major version.
      - name: Bump version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
