# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: udp-proxy

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: udp-proxy
    main: ./cmd/udp-proxy
    binary: udp-proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    # Exclude combinations that are not meaningful or supported.
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: arm
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - config.example.yaml

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance"
      regexp: "^perf"
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: ErwinsExpertise
    name: light-udp-proxy
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Docker

    ```bash
    docker pull ghcr.io/erwinsexpertise/light-udp-proxy:{{ .Tag }}
    ```

    ## Quick start

    ```bash
    ./udp-proxy -config config.example.yaml
    ```
